syntax = "proto3";

package ashton.common.v1;

option go_package = "github.com/ixxet/ashton-proto/gen/go/ashton/common/v1;commonv1";

message CheckRequest {}

message CheckResponse {
  string service = 1;
  string status = 2;
  string version = 3;
}

service HealthService {
  rpc Check(CheckRequest) returns (CheckResponse);
}
